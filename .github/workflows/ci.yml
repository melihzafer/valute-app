name: CI

# H3 (GROWTH_IDEAS): PR'lerde ve main push'larında typecheck + test + lint çalıştır.
# Releases hâlâ release.yml üzerinden; bu workflow her değişiklikte kaliteyi korur.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Hard gate — typecheck yeşil (S1 ile 3 hata giderildi).
      - name: Run TypeScript check
        run: npm run typecheck

      # Hard gate — Vitest (S1) pure logic testleri.
      - name: Run tests
        run: npm test

      # Advisory — 64 önceden-var olan hata (no-empty/no-duplicate-case vb.)
      # commit'lenmemiş M10-M13 kodunda. Tümü çözülünce continue-on-error kaldırılmalı.
      # H1 (/10000 guard) kuralı zaten 0 kez tetikleniyor.
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
